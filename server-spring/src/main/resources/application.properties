spring.application.name=docsmaster-server

# ===============================
# PostgreSQL Configuration
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/docsmaster
spring.datasource.username=docsmaster
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Remove this line (Hibernate 6 detects PostgreSQL automatically)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional
spring.jpa.open-in-view=false

# ===============================
# Server
# ===============================
server.port=8080